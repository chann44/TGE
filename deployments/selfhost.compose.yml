services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-dev}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev}
      POSTGRES_DB: ${DB_NAME:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dev} -d ${DB_NAME:-app}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tge_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tge_net

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-default}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tge_net

  migrate:
    image: ${TGE_BACKEND_IMAGE:-chann44/tge-backend:latest}
    restart: "no"
    env_file:
      - ../.env
    command:
      - /bin/sh
      - -c
      - /usr/local/bin/goose -dir /app/sql/migrations postgres "postgres://$$DB_USER:$$DB_PASSWORD@postgres:5432/$$DB_NAME?sslmode=disable" up
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tge_net

  api:
    image: ${TGE_BACKEND_IMAGE:-chann44/tge-backend:latest}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
    command: ["/usr/local/bin/api"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${API_PORT:-8080}:8080"
    networks:
      - tge_net

  worker:
    image: ${TGE_BACKEND_IMAGE:-chann44/tge-backend:latest}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
    command: ["/usr/local/bin/worker"]
    depends_on:
      api:
        condition: service_healthy
    networks:
      - tge_net

  scheduler:
    image: ${TGE_BACKEND_IMAGE:-chann44/tge-backend:latest}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
    command: ["/usr/local/bin/scheduler"]
    depends_on:
      api:
        condition: service_healthy
    networks:
      - tge_net

  web:
    image: ${TGE_WEB_IMAGE:-chann44/tge-web:latest}
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8080
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - tge_net

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:

networks:
  tge_net:
    driver: bridge
